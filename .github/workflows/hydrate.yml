name: hydrate

on:
  push:
    branches: [main]
    paths:
      - 'kubernetes/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  hydrate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: deployment
          path: deployment-branch

      - name: Instalar helm, helmfile y kubectl slice (para separar los manifests)
        run: |
          curl -fsSL https://get.helm.sh/helm-v3.16.4-linux-amd64.tar.gz | tar xz
          sudo mv linux-amd64/helm /usr/local/bin/helm
          curl -fsSL https://github.com/helmfile/helmfile/releases/download/v1.7.0/helmfile_1.7.0_linux_amd64.tar.gz | tar xz helmfile
          sudo mv helmfile /usr/local/bin/helmfile
          curl -fsSL https://github.com/patrickdappollonio/kubectl-slice/releases/download/v1.4.2/kubectl-slice_linux_x86_64.tar.gz | tar xz kubectl-slice
          sudo mv kubectl-slice /usr/local/bin/kubectl-slice

      - name: Hidratar (render → manifiestos separados)
        run: |
          OUT=deployment-branch/kubernetes/eks-demo/default/staging
          rm -rf "$OUT"
          mkdir -p "$OUT"
          helmfile -f kubernetes/eks-demo/default/staging.yaml template > /tmp/rendered.yaml            
          kubectl-slice --input-file /tmp/rendered.yaml --output-dir "$OUT" \
            --template '{{.metadata.name}}-{{.kind | lower}}.yml'

      - name: PR de ms-fake-uno
        id: cpr_uno
        uses: peter-evans/create-pull-request@v8
        with:
          path: deployment-branch
          base: deployment
          branch: auto/hydrate-staging-ms-fake-uno
          add-paths: kubernetes/eks-demo/default/staging/atm-ms-fake-uno-*
          delete-branch: true
          commit-message: "chore: hydrate staging ms-fake-uno (${{ github.sha }})"
          title: "Hydrate: ms-fake-uno (staging)"
          body: |
            Manifiestos de **ms-fake-uno** en staging.
            Mergea para aplicar a `deployment`.
          labels: hydrate

      - name: PR de ms-fake-dos
        id: cpr_dos
        uses: peter-evans/create-pull-request
        with:
          path: deployment-branch
          base: deployment
          branch: auto/hydrate-staging-ms-fak
          add-paths: kubernetes/eks-demo/default/staging/atm-ms-fake-dos-*
          delete-branch: true
          commit-message: "chore: hydrate staging ms-fake-dos (${{ github.sha }})"
          title: "Hydrate: ms-fake-dos (staging)"
          body: |
            Manifiestos de **ms-fake-dos** en staging.
            Mergea para aplicar a `deployment`.
          labels: hydrate

      - name: Resumen
        if: always()
        run: |
          OUT=deployment-branch/kubernetes/eks-demo/default/staging
          VERSION=$(grep -E '^\s*version:' kubernetes/eks-demo/default/staging.yaml | head -1 | awk '{print $2}')
          {
            echo "## 🚀 Hidratación de staging"
            echo ""
            echo "Chart \`atm\` versión \`$VERSION\` — $(ls "$OUT" | wc -l | tr -d ' ') manifiestos."
            echo ""
            echo "| Microservicio | Acción del PR | PR |"
            echo "|---|---|---|"
            echo "| ms-fake-uno | ${{ steps.cpr_uno.outputs.pull-request-operation || 'none' }} | ${{ steps.cpr_uno.outputs.pull-request-url || '—' }} |"
            echo "| ms-fake-dos | ${{ steps.cpr_dos.outputs.pull-request-operation || 'none' }} | ${{ steps.cpr_dos.outputs.pull-request-url || '—' }} |"
          } >> "$GITHUB_STEP_SUMMARY"